{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card">
      <div class="card-body p-4">
        <h2 class="h4 mb-1">Logga in</h2>
        <p class="muted">Standardkonto: <code>admin/admin</code> (byt lösenord i databas eller via miljövariabler vid installation).</p>
        <form method="post" class="mt-3">
          <div class="mb-3">
            <label class="form-label">Användarnamn</label>
            <input class="form-control" name="username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Lösenord</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <button class="btn btn-warning w-100">Logga in</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
