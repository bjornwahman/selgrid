{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="card-body">
    <h2 class="h4">API-dokumentation</h2>
    <p class="muted">Swagger UI laddas med OpenAPI-definitionen från <code>/docu/openapi.json</code>.</p>
    <div id="swagger-ui"></div>
  </div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
<style>
  #swagger-ui,
  #swagger-ui .wrapper,
  #swagger-ui .information-container {
    color: #f3f4f6;
  }
  #swagger-ui .scheme-container,
  #swagger-ui .opblock,
  #swagger-ui .model-box,
  #swagger-ui .responses-table,
  #swagger-ui .response-col_status,
  #swagger-ui .response-col_description,
  #swagger-ui .opblock-section-header {
    background: #111827;
    color: #f9fafb;
    border-color: #374151;
  }
  #swagger-ui .opblock .opblock-summary-description,
  #swagger-ui .opblock-description-wrapper p,
  #swagger-ui .tab li,
  #swagger-ui label,
  #swagger-ui p,
  #swagger-ui h1,
  #swagger-ui h2,
  #swagger-ui h3,
  #swagger-ui h4,
  #swagger-ui h5,
  #swagger-ui .prop-type,
  #swagger-ui .parameter__name,
  #swagger-ui .parameter__type,
  #swagger-ui .parameter__deprecated,
  #swagger-ui .response-col_links,
  #swagger-ui .responses-inner h4,
  #swagger-ui .responses-inner h5,
  #swagger-ui .markdown {
    color: #f3f4f6 !important;
  }
  #swagger-ui input,
  #swagger-ui textarea,
  #swagger-ui select {
    background: #0f172a;
    color: #f8fafc;
    border-color: #4b5563;
  }
  #swagger-ui .btn.execute {
    background-color: #ff8a00;
    color: #111827;
    border-color: #ff8a00;
  }
  #swagger-ui .dialog-ux .modal-ux {
    background: #111827;
    border: 1px solid #374151;
    box-shadow: 0 20px 45px rgba(0, 0, 0, 0.45);
    color: #f9fafb;
  }
  #swagger-ui .dialog-ux .modal-ux-header,
  #swagger-ui .dialog-ux .modal-ux-content {
    background: #111827;
    color: #f9fafb;
    border-color: #374151;
  }
  #swagger-ui .dialog-ux .modal-ux-header h3,
  #swagger-ui .dialog-ux .auth-container,
  #swagger-ui .dialog-ux .auth-container p,
  #swagger-ui .dialog-ux .auth-container label,
  #swagger-ui .dialog-ux .auth-container .scopes h2,
  #swagger-ui .dialog-ux .auth-container .scope-def {
    color: #f3f4f6 !important;
  }
  #swagger-ui .dialog-ux .auth-container h4 {
    color: transparent !important;
  }
  #swagger-ui .dialog-ux .auth-container h4 code {
    color: #f59e0b !important;
    background: transparent;
    font-size: 1rem;
    padding: 0;
  }
  #swagger-ui .dialog-ux .auth-btn-wrapper .btn,
  #swagger-ui .dialog-ux .btn.modal-btn {
    background: #1f2937;
    color: #f9fafb;
    border: 1px solid #4b5563;
  }
  #swagger-ui .dialog-ux .btn.modal-btn.auth {
    background: #ff8a00;
    color: #111827;
    border-color: #ff8a00;
  }
  #swagger-ui .dialog-ux .modal-ux-header .close-modal {
    color: #f9fafb;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
  window.localStorage.removeItem("authorized");
  window.ui = SwaggerUIBundle({
    url: "{{ url_for('docu_openapi') }}",
    dom_id: '#swagger-ui',
    deepLinking: true,
    persistAuthorization: false,
  });
</script>
{% endblock %}
