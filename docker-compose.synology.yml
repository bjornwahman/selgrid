name: selgrid

services:
  selgrid:
    image: selenium/standalone-chrome:4.24.0
    container_name: selgrid
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "4444:4444"
    environment:
      TZ: ${TZ:-Europe/Stockholm}
      APP_SECRET: ${APP_SECRET}
      GITHUB_USERNAME: ${GITHUB_USERNAME:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY}
      GITHUB_REF: ${GITHUB_REF:-main}
      DATABASE_URL: sqlite:////opt/selgrid/data/selgrid.db
      SELENIUM_REMOTE_URL: http://127.0.0.1:4444/wd/hub
    volumes:
      - /volume1/docker/selgrid/synology-start.sh:/synology-start.sh:ro
      - selgrid_data:/opt/selgrid/data
      - selgrid_uploads:/opt/selgrid/uploads
    command: >
      bash -lc "
      chmod +x /synology-start.sh &&
      /synology-start.sh
      "

volumes:
  selgrid_data:
  selgrid_uploads:
